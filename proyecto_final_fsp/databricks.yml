# This is a Databricks asset bundle definition for proyecto_final_fsp.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: proyecto_final_fsp
  uuid: 379beb9c-fa2e-4af9-b17f-858765291f59

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  bronze_schema:
    description: Esquema de bronce
  silver_schema:
    description: Esquema silver
  gold_schema:
    description: Esquema gold
  

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-07f08cd8-9b0c.cloud.databricks.com
    variables:
      catalog: proyecto_final_dmc
      schema: ${workspace.current_user.short_name}
      bronze_schema: bronze_dev
      silver_schema: silver_dev
      gold_schema: gold_dev
  prod:
    mode: production
    workspace:
      host: https://dbc-07f08cd8-9b0c.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/fernando.miguel.salazar.p@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/fernando.miguel.salazar.p@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: proyecto_final_dmc
      schema: prod
      bronze_schema: bronze_prod
      silver_schema: silver_prod
      gold_schema: gold_prod
    permissions:
      - user_name: fernando.miguel.salazar.p@gmail.com
        level: CAN_MANAGE
